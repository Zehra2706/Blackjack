<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <title>Blackjack</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        height: 100vh;
        background-image: url("unnamed.jpg");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        color: white;
        text-align: center;
        font-family: Arial;
      }

      .cards {
        display: flex;
        justify-content: center;
        gap: 8px;
        margin: 10px;
      }

      .card {
        width: 55px;
        height: 80px;
        position: relative;

        perspective: 1000px;
      }

      .card-inner {
        position: relative;
        width: 55px;
        height: 80px;
        transform-style: preserve-3d;
        transition: transform 0.6s;
      }

      .card-inner.flip {
        transform: rotateY(180deg);
      }

      .card-front,
      .card-back {
        position: absolute;
        width: 100%;
        height: 100%;
        backface-visibility: hidden;
        top: 0;
        left: 0;
      }

      .card-back {
        transform: rotateY(180deg);
      }

      button {
        background-color: #c50909;
        color: rgb(4, 5, 4);
        padding: 10px 20px;
        margin: 10px;
        font-size: 16px;
      }
      #result {
        height: 40px;
        margin: 10px 0;
        font-size: 20px;
        font-weight: bold;
        text-align: center;
      }

      .player {
        margin-top: 190px;
      }
      .dealer {
        margin-top: 150px;
      }
    </style>
  </head>

  <body>
    <h1>BLACKJACK</h1>

    <div class="dealer">
      <div id="dealer-cards" class="cards"></div>
    </div>
    <p id="result"></p>
    <div class="player">
      <h2>Player</h2>
      <div id="player-cards" class="cards"></div>
    </div>
    <button onclick="hit()">Hit</button>
    <button onclick="stand()">Stand</button>

    <script src="app.js">
      const resultEl = document.getElementById("result");
      resultEl.innerText = game.result;
      resultEl.style.display = "block";
    </script>
  </body>
</html>
